name: Deploy CivicEdge Documentation

on:
  push:
    branches:
      - main
      - feature/user
    paths:
      - "CivicEdge-docs/**"
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: mkdocs
        run: |
          pip install mkdocs mkdocs-material

      - name: Deploy documentation
        working-directory: CivicEdge-docs
        run: |
          mkdocs gh-deploy --force