<!DOCTYPE html>
<html>
  <body style="font-family: Arial, sans-serif; line-height: 1.6;">
    <p>Hello <strong>{{ user_name }}</strong>,</p>

    <p>
      Your participation certificate for 
      <strong>{{ event_title }}</strong> is ready 🎉
    </p>

    <p>
      <strong>Certificate ID:</strong> {{ reference_id }}
    </p>

    <p>
      <a href="{{ certificate_url }}" 
         style="background:#2563eb;color:white;padding:10px 16px;text-decoration:none;border-radius:6px;">
        View Certificate
      </a>
    </p>

    <p>
      Thank you for your contribution to the community.
    </p>

    <p>
      — CivicEdge Team
    </p>
  </body>
</html>
