version: "3.9"

services:
  django:
    container_name: civicedge-django
    build:
      context: .
      dockerfile: docker/django/Dockerfile.prod
    command: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    env_file:
      - .env
    environment:
      ENV: production
      DJANGO_SETTINGS_MODULE: config.settings
      DB_HOST: postgres
    depends_on:
      - postgres
      - redis
    restart: always

  celery:
    container_name: civicedge-celery
    build:
      context: .
      dockerfile: docker/django/Dockerfile.prod
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      ENV: production
      DB_HOST: postgres
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      - django
      - postgres
      - redis
    restart: always

  celery-beat:
    container_name: civicedge-celery-beat
    build:
      context: .
      dockerfile: docker/django/Dockerfile.prod
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      ENV: production
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      - redis
      - django
    restart: always

  postgres:
    image: postgres:15
    container_name: civicedge-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: civicedge-redis
    restart: always

  nginx:
    container_name: civicedge-nginx
    build:
      context: ./frontend
      dockerfile: ../docker/react/Dockerfile.prod
    ports:
      - "3000:80"
    depends_on:
      - django
    restart: always

volumes:
  postgres_data: