server {
    listen 80;
    server_name _;

    # frontend
    root /usr/share/nginx/html;
    index index.html;

    # React routing
    location / {
        try_files $uri /index.html;
    }

    # API → Django
    location /api/ {
        proxy_pass http://django:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}